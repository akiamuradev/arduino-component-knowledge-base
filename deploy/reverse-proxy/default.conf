upstream ackb_backend {
    server backend:8000;
}

upstream ackb_frontend {
    server frontend:8080;
}

server {
    listen 8080;
    server_name _;
    server_tokens off;
    client_max_body_size 260m;

    location = /health {
        proxy_pass http://ackb_backend/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /ready {
        proxy_pass http://ackb_backend/ready;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://ackb_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 30s;
    }

    location / {
        proxy_pass http://ackb_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
